<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日论文精粹</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex items-center justify-center">
    <div class="max-w-4xl w-full px-4 py-12">
        <!-- 标题 -->
        <header class="text-center mb-16">
            <h1 class="text-5xl font-bold text-gray-800 mb-4">每日论文精粹</h1>
            <p class="text-xl text-gray-500">聚焦前沿学术成果，AI 驱动文献筛选</p>
        </header>

        <!-- 导航卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- AI发展相关论文 -->
            <a href="ai.html" class="block">
                <div class="card-hover bg-white rounded-2xl shadow-lg p-12 text-center transition-all duration-300 border-t-4 border-indigo-500 h-64 flex flex-col items-center justify-center">
                    <div class="text-6xl mb-4">🤖</div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">AI发展相关论文</h2>
                    <p class="text-gray-500">人工智能领域最新研究</p>
                </div>
            </a>

            <!-- 每日论文推送 -->
            <a href="ieee.html" class="block">
                <div class="card-hover bg-white rounded-2xl shadow-lg p-12 text-center transition-all duration-300 border-t-4 border-emerald-500 h-64 flex flex-col items-center justify-center">
                    <div class="text-6xl mb-4">📡</div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">每日论文推送</h2>
                    <p class="text-gray-500">神经网络控制 / IEEE数据源</p>
                </div>
            </a>
        </div>

        <!-- 页脚 -->
        <footer class="text-center mt-16 text-gray-400 text-sm">
            <p>每日自动更新 · Powered by MiniMax AI</p>
        </footer>
    </div>
</body>
</html>
